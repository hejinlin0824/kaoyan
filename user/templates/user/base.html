{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}考研平台{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f0f2f5;
            color: #333;
            min-height: 100vh;
        }
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 0 40px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .navbar .logo {
            font-size: 22px;
            font-weight: bold;
            color: #fff;
            text-decoration: none;
            letter-spacing: 1px;
        }
        .navbar .nav-links { display: flex; align-items: center; gap: 20px; }
        .navbar .nav-links a {
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            font-size: 15px;
            padding: 6px 14px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .navbar .nav-links a:hover { background: rgba(255,255,255,0.15); color: #fff; }
        .vip-badge {
            background: linear-gradient(135deg, #f5af19, #f12711);
            color: #fff;
            font-size: 12px;
            font-weight: bold;
            padding: 2px 10px;
            border-radius: 12px;
            margin-left: 6px;
        }
        .main-content {
            max-width: 960px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            padding: 40px;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #555;
            margin-bottom: 6px;
        }
        .form-input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #d9d9d9;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.2s;
            outline: none;
        }
        .form-input:focus { border-color: #667eea; box-shadow: 0 0 0 2px rgba(102,126,234,0.2); }
        .form-error { color: #ff4d4f; font-size: 13px; margin-top: 4px; }
        .form-errors-all {
            background: #fff2f0;
            border: 1px solid #ffccc7;
            color: #ff4d4f;
            padding: 10px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .btn {
            display: inline-block;
            padding: 10px 28px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(102,126,234,0.4); }
        .btn-outline {
            background: transparent;
            border: 1px solid #d9d9d9;
            color: #666;
        }
        .btn-outline:hover { border-color: #667eea; color: #667eea; }
        .btn-block { display: block; width: 100%; text-align: center; }
        .text-center { text-align: center; }
        .mt-20 { margin-top: 20px; }
        .page-title { font-size: 28px; font-weight: 700; margin-bottom: 30px; color: #1a1a2e; }
        .hero { text-align: center; padding: 60px 20px; }
        .hero h1 {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
        }
        .hero p { font-size: 18px; color: #888; margin-bottom: 30px; }
        .vip-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border-radius: 12px;
            padding: 24px 30px;
            margin-top: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .vip-card .vip-info h3 { font-size: 18px; margin-bottom: 4px; }
        .vip-card .vip-info p { opacity: 0.85; font-size: 14px; }
        .vip-card .vip-badge-large {
            background: linear-gradient(135deg, #f5af19, #f12711);
            padding: 6px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 16px;
        }
        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 40px;
        }
        .feature-item {
            background: #fff;
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            transition: transform 0.2s;
        }
        .feature-item:hover { transform: translateY(-4px); box-shadow: 0 6px 20px rgba(0,0,0,0.12); }
        .feature-icon { font-size: 40px; margin-bottom: 14px; }
        .feature-item h3 { font-size: 16px; margin-bottom: 8px; color: #1a1a2e; }
        .feature-item p { font-size: 13px; color: #999; }
        .feature-lock { opacity: 0.5; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="{% url 'user:home' %}" class="logo">📚 考研平台</a>
        <div class="nav-links">
            <a href="{% url 'kaoyan:question_list' %}">题库</a>
            {% if user.is_authenticated and user.is_staff %}
                <a href="{% url 'kaoyan:question_add' %}">录入题目</a>
            {% endif %}
            {% if user.is_authenticated %}
                <span style="color: #fff; font-size: 15px;">
                    {{ user.username }}
                    {% if is_vip %}
                        <span class="vip-badge">{{ vip_label }}</span>
                    {% endif %}
                </span>
                <a href="{% url 'user:logout' %}">退出登录</a>
            {% else %}
                <a href="{% url 'user:login' %}">登录</a>
                <a href="{% url 'user:register' %}">注册</a>
            {% endif %}
        </div>
    </nav>

    <div class="main-content">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
