{% extends "user/base.html" %}

{% block title %}重置邮件已发送 - 厘米考研{% endblock %}

{% block content %}
<div style="max-width:420px;margin:60px auto;">
    <div class="card" style="padding:40px 36px;text-align:center;">
        <i class="fa-solid fa-envelope-circle-check" style="font-size:48px;color:var(--green-500);margin-bottom:20px;"></i>
        <h2 style="font-size:20px;font-weight:700;color:var(--gray-900);margin-bottom:8px;">重置邮件已发送</h2>
        <p style="font-size:14px;color:var(--gray-500);margin-bottom:24px;">
            我们已向 <strong style="color:var(--blue-600);">{{ email }}</strong> 发送了密码重置链接，请查收邮件。
        </p>
        <p style="font-size:13px;color:var(--gray-400);margin-bottom:32px;">
            如果没有收到，请检查垃圾邮件文件夹。
        </p>
        <a href="{% url 'user:login' %}" class="btn btn-primary btn-lg">
            <i class="fa-solid fa-arrow-left"></i> 返回登录
        </a>
    </div>
</div>
{% endblock %}
