{% extends "user/base.html" %}

{% block title %}确认删除 - 考研平台{% endblock %}

{% block content %}
<div style="max-width: 480px; margin: 80px auto;">
    <div class="card" style="text-align: center; padding: 40px;">
        <i class="fa-solid fa-triangle-exclamation" style="font-size: 48px; color: #dc2626; margin-bottom: 20px;"></i>
        <h1 style="font-size: 20px; font-weight: 700; color: var(--gray-900); margin-bottom: 8px;">确认删除</h1>
        <p style="font-size: 14px; color: var(--gray-500); margin-bottom: 32px;">确定要删除这道题目吗？此操作不可撤销。</p>
        <form method="post" style="display: flex; gap: 12px; justify-content: center;">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger"><i class="fa-solid fa-trash-can"></i> 确认删除</button>
            <a href="{% url 'kaoyan:question_list' %}" class="btn btn-outline">取消</a>
        </form>
    </div>
</div>
{% endblock %}
